methodology_summary: >
  Multi-signal hybrid scorer combining TF-IDF semantic similarity (28%), 
  skills-match scoring against JD-required and bonus signals (28%), 
  career quality scoring for product-company ratio/title fit/YoE/tenure (20%), 
  platform behavioral signals for recency/response rate/availability (14%), 
  and location fit (10%). Disqualifier multipliers applied for consulting-only 
  career, wrong-role title, job-hopper patterns, and honeypot profiles. 
  Runs on CPU in ~55 seconds for 100K candidates with no external API calls.

submission_csv: "submission.csv"
candidates_file: "candidates.jsonl"
run_command: "python src/rank.py --candidates ./candidates.jsonl --out ./submission.csv"
